<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <!-- Accent Gradient 1 (Indigo to Violet) -->
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <!-- Accent Gradient 2 (Cyan to Teal) -->
    <linearGradient id="glow2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>
  </defs>
  <!-- Background Rounded Rect -->
  <rect width="128" height="128" rx="36" fill="url(#bgGrad)" />
  
  <!-- Interlocking geometric flow paths (extremely clean and premium) -->
  <g transform="translate(16, 16)">
    <!-- Path 1 (Cyan/Teal flow) -->
    <path d="M24,48 C24,32 36,20 52,20 C68,20 80,32 80,48 C80,64 68,76 52,76 L24,76" fill="none" stroke="url(#glow2)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.85" />
    <!-- Path 2 (Indigo/Violet flow) -->
    <path d="M72,48 C72,64 60,76 44,76 C28,76 16,64 16,48 C16,32 28,20 44,20 L72,20" fill="none" stroke="url(#glow1)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Center glowing dot to represent a central hub / metrics -->
    <circle cx="44" cy="48" r="8" fill="#ffffff" />
  </g>
</svg>